name: Edge Functions Parse Check

# Boot-breaker gate for Supabase Edge Functions. Catches the C1–C4 class of syntax errors
# (stray imports in function bodies, raw backticks in template literals) that make a function
# fail to boot. Tolerates the suite's pre-existing type errors — see scripts/check-edge-functions-parse.sh.

on:
  push:
    paths:
      - "supabase/functions/**"
      - "scripts/check-edge-functions-parse.sh"
      - ".github/workflows/edge-functions-parse.yml"
  pull_request:
    paths:
      - "supabase/functions/**"
      - "scripts/check-edge-functions-parse.sh"
      - ".github/workflows/edge-functions-parse.yml"

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Parse/boot check edge functions
        run: bash scripts/check-edge-functions-parse.sh
