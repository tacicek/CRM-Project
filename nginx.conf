server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # /embed/* routes: allow third-party iframe embedding (widget used on customer sites).
    # frame-ancestors * is intentional here — restricting it would break the embed widget.
    location /embed/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        try_files $uri $uri/ /index.html;
    }

    # index.html should never be cached (ensures fresh JS chunk references)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # SPA routing - all routes go to index.html
    location / {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        try_files $uri $uri/ /index.html;
    }

    # Static assets with hash in filename - cache forever (immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }
}
